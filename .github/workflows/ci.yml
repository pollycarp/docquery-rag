name: CI

# Run on every push and pull request to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    # Spin up a real PostgreSQL + pgvector database for the tests
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpassword
          POSTGRES_DB: ragdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"   # cache pip downloads between runs for speed

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      # 4. Create a .env file with test values
      #    (never use real secrets in CI — these are safe test values)
      - name: Create .env file
        run: |
          echo "API_KEY=dev-secret-key"        >> .env
          echo "POSTGRES_USER=raguser"          >> .env
          echo "POSTGRES_PASSWORD=ragpassword"  >> .env
          echo "POSTGRES_DB=ragdb"              >> .env
          echo "POSTGRES_HOST=localhost"        >> .env
          echo "POSTGRES_PORT=5432"             >> .env
          echo "OLLAMA_MODEL=llama3.2"          >> .env

      # 5. Run all tests
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
